<!-- header.html -->
<header class="top-bar">
  <div class="top-bar-left">
    <div class="header-icons">
      <div class="icon-btn" id="sidebarToggle"><i class="fas fa-bars"></i></div>
      <div class="icon-btn" id="fullscreenToggle"><i class="fas fa-expand"></i></div>
    </div>
    <a href="#" class="school-logo-link">
      <div class="school-logo"><img src="logo.jpeg" alt="Eastern High School Logo"></div>
    </a>
    <div class="school-name-wrap">
      <span class="school-name">Muhammad Education System, Faisalabad Campus</span>
    </div>
  </div>
  
  <div class="top-bar-right">
    <div class="icon-btn"><i class="fas fa-bell"></i></div>
    <div class="datetime-display">
      <div class="date-box"><i class="fas fa-calendar-alt"></i><span class="date-text" id="currentDate"></span></div>
      <div class="time-box"><i class="fas fa-clock"></i><span class="time-text" id="currentTime"></span></div>
    </div>
    <div class="header-dropdown">
      <div class="icon-btn" id="threeDotsBtn"><i class="fas fa-ellipsis-v"></i></div>
      <div class="dropdown-menu" id="headerDropdown">
        <a href="#" class="dropdown-item"><i class="fas fa-user-circle"></i> Profile</a>
        <a href="#" class="dropdown-item"><i class="fas fa-key"></i> Change Password</a>
        <a href="#" class="dropdown-item"><i class="fas fa-id-card"></i> Login Credentials</a>
        <div style="height:1px;background:#e5e7eb;margin:6px 0"></div>
        <a href="#" class="dropdown-item" style="color:#ef4444"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>
</header>
