<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EHS – View Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="view-fee-details.css">
  <link rel="stylesheet" href="components-responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="app-wrapper" id="appWrapper">
    <div id="sidebar-placeholder"></div>
    <div class="app-container">
      <main class="main-panel">
        <div class="page-header">
          <h1><i class="fas fa-file-invoice-dollar"></i> View Details</h1>
          <p>View all fee payment records. Search, filter by class or payment status, and view receipts.</p>
        </div>
        <div class="data-card">
          <div class="card-header">
            <h2><i class="fas fa-list-alt"></i> Fee Records <span class="badge-count" id="recordCountBadge">0</span></h2>
          </div>
          <div class="filters-row">
            <div class="search-wrap">
              <i class="fas fa-search"></i>
              <input type="text" class="search-input" id="searchInput" placeholder="Search by name, reg no, receipt…" oninput="applyFilters()">
            </div>
            <select class="filter-select" id="classFilter" onchange="applyFilters()">
              <option value="">All Classes</option>
            </select>
            <select class="filter-select" id="statusFilter" onchange="applyFilters()">
              <option value="">All Status</option>
              <option value="Paid">Paid</option>
              <option value="Unpaid">Unpaid</option>
            </select>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Photo</th>
                  <th>Reg No.</th>
                  <th>Student Name</th>
                  <th>Class Name</th>
                  <th>Fee Type</th>
                  <th>Fee Month</th>
                  <th>Amount (PKR)</th>
                  <th>Status</th>
                  <th>Receipt No.</th>
                  <th>Paid Date & Time</th>
                  <th style="text-align:right">Receipt</th>
                </tr>
              </thead>
              <tbody id="detailsTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Receipt Modal -->
  <div class="modal-overlay" id="receiptModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fas fa-receipt"></i> Fee Receipt</h3>
        <button class="modal-close" onclick="closeReceipt()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="receiptContent"></div>
    </div>
  </div>

<script src="components.js"></script>
<script>
  function loadComponents() {
    fetch('header.html').then(r => r.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
    fetch('sidebar.html').then(r => r.text()).then(data => document.getElementById('sidebar-placeholder').innerHTML = data);
  }

  window.onload = function() {
    loadComponents();
    setTimeout(() => { if (typeof window.initHeaderAndSidebar === 'function') window.initHeaderAndSidebar(); }, 400);
    buildClassFilter();
    applyFilters();
  };

  function loadFeeRecords() {
    const stored = localStorage.getItem('ehsFeeRecords');
    if (stored) return JSON.parse(stored);
    return [];
  }

  function buildClassFilter() {
    const records = loadFeeRecords();
    const classes = [...new Set(records.map(r => r.className))].sort();
    const sel = document.getElementById('classFilter');
    sel.innerHTML = '<option value="">All Classes</option>' +
      classes.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const classVal = document.getElementById('classFilter').value;
    const statusVal = document.getElementById('statusFilter').value;
    let records = loadFeeRecords();

    if (classVal) records = records.filter(r => r.className === classVal);
    if (statusVal) records = records.filter(r => r.status === statusVal);
    if (search) {
      records = records.filter(r =>
        r.studentName.toLowerCase().includes(search) ||
        r.regNo.toLowerCase().includes(search) ||
        (r.receiptNo && r.receiptNo.toLowerCase().includes(search)) ||
        r.feeType.toLowerCase().includes(search)
      );
    }

    renderTable(records);
  }

  function renderTable(records) {
    const tbody = document.getElementById('detailsTableBody');
    document.getElementById('recordCountBadge').textContent = records.length;

    if (records.length === 0) {
      tbody.innerHTML = `<tr><td colspan="11">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No records found matching your filters.</p>
        </div>
       </td></tr>`;
      return;
    }

    tbody.innerHTML = records.map(record => {
      const photoHtml = record.photoUrl
        ? `<img src="${record.photoUrl}" class="photo-thumb" alt="student">`
        : `<div class="photo-placeholder"><i class="fas fa-user-graduate"></i></div>`;

      const statusHtml = record.status === "Paid"
        ? `<span class="status-badge status-paid"><i class="fas fa-check-circle"></i> Paid</span>`
        : `<span class="status-badge status-unpaid"><i class="fas fa-clock"></i> Unpaid</span>`;

      const receiptCell = record.receiptNo
        ? `<span class="receipt-code">${record.receiptNo}</span>`
        : `<span style="color:#94a3b8">—</span>`;

      const paidCell = record.paidDateTime
        ? `<span style="font-size:13px;color:#475569">${record.paidDateTime}</span>`
        : `<span style="color:#94a3b8">—</span>`;

      const receiptBtn = record.status === "Paid"
        ? `<button class="btn-receipt" title="View Receipt" onclick="openReceipt('${record.id}')"><i class="fas fa-receipt"></i></button>`
        : `<span style="color:#cbd5e1;font-size:18px;padding:4px 8px;"><i class="fas fa-receipt"></i></span>`;

      return `
        <tr>
          <td>${photoHtml}</td>
          <td><strong>${record.regNo}</strong></td>
          <td>${record.studentName}</td>
          <td>${record.className}</td>
          <td>${record.feeType}</td>
          <td>${record.feeMonth}</td>
          <td><strong>PKR ${record.amount.toLocaleString()}</strong></td>
          <td>${statusHtml}</td>
          <td>${receiptCell}</td>
          <td>${paidCell}</td>
          <td style="text-align:right"><div class="action-icons">${receiptBtn}</div></td>
        </tr>
      `;
    }).join('');
  }

  function openReceipt(recordId) {
    const records = loadFeeRecords();
    const r = records.find(rec => rec.id === recordId);
    if (!r || r.status !== "Paid") return;

    document.getElementById('receiptContent').innerHTML = `
      <div class="receipt-logo">
        <div class="school-name">EHS SCHOOL SYSTEM</div>
        <div class="sub">Fee Payment Receipt</div>
      </div>
      <hr class="receipt-divider">
      <div class="receipt-row"><span class="label">Receipt No.</span><span class="value receipt-code">${r.receiptNo}</span></div>
      <div class="receipt-row"><span class="label">Paid On</span><span class="value">${r.paidDateTime}</span></div>
      <hr class="receipt-divider">
      <div class="receipt-row"><span class="label">Student Name</span><span class="value">${r.studentName}</span></div>
      <div class="receipt-row"><span class="label">Father Name</span><span class="value">${r.fatherName}</span></div>
      <div class="receipt-row"><span class="label">Reg No.</span><span class="value">${r.regNo}</span></div>
      <div class="receipt-row"><span class="label">Class</span><span class="value">${r.className}</span></div>
      <hr class="receipt-divider">
      <div class="receipt-row"><span class="label">Fee Type</span><span class="value">${r.feeType}</span></div>
      <div class="receipt-row"><span class="label">Fee Month</span><span class="value">${r.feeMonth}</span></div>
      <div class="receipt-row"><span class="label">Due Date</span><span class="value">${formatDate(r.dueDate)}</span></div>
      <div class="receipt-amount-box">
        <span class="amt-label">Total Amount Paid</span>
        <span class="amt-value">PKR ${r.amount.toLocaleString()}</span>
      </div>
      <div class="receipt-footer">Thank you! This is a computer-generated receipt.</div>
    `;
    document.getElementById('receiptModal').classList.add('open');
  }

  function closeReceipt() {
    document.getElementById('receiptModal').classList.remove('open');
  }

  document.addEventListener('click', function(e) {
    if (e.target === document.getElementById('receiptModal')) closeReceipt();
  });

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-PK', { year: 'numeric', month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
