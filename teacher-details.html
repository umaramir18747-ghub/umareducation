<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>EHS – Teacher Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="teacher-details.css">
<link rel="stylesheet" href="components-responsive.css">
</head>
<body>
    <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<div class="app-container">
  <main class="main-panel">
    <div class="page-header">
      <h1><i class="fas fa-chalkboard-teacher"></i> Teacher Directory & Records</h1>
      <p>Manage teacher profiles, track employment status, and access complete professional details.</p>
    </div>
    <div class="data-card">
      <div class="card-header">
        <h2><i class="fas fa-users"></i> Faculty Members <span class="badge-count" id="teacherCountBadge">0</span></h2>
        <i class="fas fa-search" style="color:#94a3b8; font-size:18px;"></i>
      </div>
      <div class="table-wrapper">
        <table id="teacherTable">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Reg No.</th>
              <th>Teacher Name</th>
              <th>Father Name</th>
              <th>Qualification</th>
              <th>Phone</th>
              <th>Status</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="teacherTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="teacherSlidePanel" class="teacher-overlay">
  <div class="teacher-detail-panel">
    <div class="panel-header">
      <h2><i class="fas fa-chalkboard-user"></i> Teacher Profile</h2>
      <button class="close-panel-btn" id="closeSlideBtn"><i class="fas fa-times"></i></button>
    </div>
    <div id="dynamicPanelContent"></div>
  </div>
</div>
<script src="components.js"></script>
<script>
    function loadComponents() {
      fetch('header.html')
        .then(response => response.text())
        .then(data => document.getElementById('header-placeholder').innerHTML = data)
        .catch(err => console.error('Error loading header:', err));

      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => document.getElementById('sidebar-placeholder').innerHTML = data)
        .catch(err => console.error('Error loading sidebar:', err));
    }

    window.onload = function() {
      loadComponents();
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };

let teachers = [
  {regNo:"TCH-1001",teacherName:"Dr. Muhammad Aslam",fatherName:"Abdul Rehman",phoneNumber:"0300-1234567",cnic:"35201-1234567-1",address:"House #15, Street 8, Gulberg, Lahore",email:"aslam@ehs.edu",gender:"Male",dob:"1975-03-15",nationality:"Pakistani",religion:"Islam",qualification:"PhD in Mathematics, M.Ed",subjectsCanTeach:"Mathematics, Physics, Computer Science",previousSchool:"Government College University, Lahore",experience:"18 Years",designation:"Head of Department",joiningDate:"2010-08-01",status:"Active",photoUrl:"https://randomuser.me/api/portraits/men/32.jpg"},
  {regNo:"TCH-1002",teacherName:"Prof. Ayesha Siddiqui",fatherName:"Hassan Ahmed",phoneNumber:"0301-7654321",cnic:"42101-7654321-2",address:"Street 12, Phase 2, DHA, Karachi",email:"ayesha.s@ehs.edu",gender:"Female",dob:"1980-07-22",nationality:"Pakistani",religion:"Islam",qualification:"MSc Chemistry, B.Ed",subjectsCanTeach:"Chemistry, Biology, General Science",previousSchool:"Karachi Grammar School",experience:"12 Years",designation:"Senior Teacher",joiningDate:"2012-03-15",status:"Active",photoUrl:"https://randomuser.me/api/portraits/women/68.jpg"},
  {regNo:"TCH-1003",teacherName:"Rashid Mehmood",fatherName:"Mehmood Ali",phoneNumber:"0345-9876543",cnic:"38403-9876543-3",address:"Mohallah Jinnah, Faisalabad",email:"rashid.m@ehs.edu",gender:"Male",dob:"1985-11-10",nationality:"Pakistani",religion:"Islam",qualification:"MA English, B.Ed",subjectsCanTeach:"English, Urdu, Islamic Studies",previousSchool:"Punjab College, Faisalabad",experience:"8 Years",designation:"Junior Teacher",joiningDate:"2015-09-01",status:"Inactive",photoUrl:"https://randomuser.me/api/portraits/men/91.jpg"},
  {regNo:"TCH-1004",teacherName:"Saba Tariq",fatherName:"Tariq Javed",phoneNumber:"0333-1122334",cnic:"36502-1122334-4",address:"Gulshan-e-Iqbal, Block 5, Karachi",email:"saba.t@ehs.edu",gender:"Female",dob:"1988-04-18",nationality:"Pakistani",religion:"Islam",qualification:"MSc Physics, B.Ed",subjectsCanTeach:"Physics, Mathematics, Computer",previousSchool:"Beaconhouse School System",experience:"7 Years",designation:"Senior Teacher",joiningDate:"2016-07-20",status:"Active",photoUrl:"https://randomuser.me/api/portraits/women/44.jpg"},
  {regNo:"TCH-1005",teacherName:"Khalid Zaman",fatherName:"Zaman Khan",phoneNumber:"0312-9988776",cnic:"42101-9988776-5",address:"Model Town, Multan",email:"khalid.z@ehs.edu",gender:"Male",dob:"1982-12-05",nationality:"Pakistani",religion:"Islam",qualification:"MBA, B.Com",subjectsCanTeach:"Business Studies, Economics, Accounting",previousSchool:"The City School",experience:"10 Years",designation:"Senior Teacher",joiningDate:"2014-01-10",status:"Active",photoUrl:null}
];

function updateCount(){
  document.getElementById('teacherCountBadge').innerText = teachers.length;
}

function renderTable(){
  let tbody = document.getElementById('teacherTableBody');
  if(!tbody) return;
  
  tbody.innerHTML = teachers.map(t => {
    const photoHtml = t.photoUrl 
      ? `<img src="${t.photoUrl}" class="photo-thumb" alt="${t.teacherName}">` 
      : `<div class="photo-placeholder"><i class="fas fa-chalkboard-teacher"></i></div>`;
    
    return `
      <tr>
        <td>${photoHtml}</td>
        <td><strong>${t.regNo}</strong></td>
        <td><strong>${t.teacherName}</strong></td>
        <td>${t.fatherName}</td>
        <td>${t.qualification}</td>
        <td>${t.phoneNumber}</td>
        <td>
          <select class="status-select ${t.status==='Active'?'active-select':'inactive-select'}" 
                  onchange="updateStatus('${t.regNo}',this.value)">
            <option value="Active" ${t.status==='Active'?'selected':''}>Active</option>
            <option value="Inactive" ${t.status==='Inactive'?'selected':''}>Inactive</option>
          </select>
        </td>
        <td style="text-align:right">
          <div class="action-icons">
            <i class="fas fa-eye view-icon" data-id="${t.regNo}"></i>
            <i class="fas fa-edit edit-icon" data-id="${t.regNo}"></i>
            <i class="fas fa-trash-alt delete-icon" data-id="${t.regNo}"></i>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  document.querySelectorAll('.view-icon').forEach(i => i.addEventListener('click', () => openPanel(i.dataset.id)));
  document.querySelectorAll('.edit-icon').forEach(i => i.addEventListener('click', () => toast(`✏️ Edit ${i.dataset.id}`)));
  document.querySelectorAll('.delete-icon').forEach(i => i.addEventListener('click', () => {
    if(confirm(`Delete ${i.dataset.id}?`)){
      teachers = teachers.filter(t => t.regNo !== i.dataset.id);
      updateCount();
      renderTable();
      toast(`🗑️ Deleted`);
    }
  }));
}

window.updateStatus = (id, ns) => {
  let t = teachers.find(t => t.regNo === id);
  if(t){
    t.status = ns;
    renderTable();
    toast(`✅ Status: ${ns}`);
  }
};

function openPanel(id){
  let t = teachers.find(t => t.regNo === id);
  if(!t) return;
  let photoHtml = t.photoUrl ? `<img src="${t.photoUrl}">` : `<i class="fas fa-chalkboard-teacher"></i>`;
  let subjectTags = t.subjectsCanTeach.split(',').map(s => s.trim()).map(sub => `<span class="subjects-tag">${sub}</span>`).join('');
  
  document.getElementById('dynamicPanelContent').innerHTML = `
    <div class="photo-frame-section">
      <div class="photo-frame">${photoHtml}</div>
      <div class="reg-number-bold"><i class="fas fa-qrcode"></i> ${t.regNo}</div>
    </div>
    <div class="info-group">
      <h4><i class="fas fa-address-card"></i> Personal Information</h4>
      <div class="info-row"><div class="info-label">Teacher Name</div><div class="info-value">${t.teacherName}</div></div>
      <div class="info-row"><div class="info-label">Father Name</div><div class="info-value">${t.fatherName}</div></div>
      <div class="info-row"><div class="info-label">Phone</div><div class="info-value">${t.phoneNumber}</div></div>
      <div class="info-row"><div class="info-label">CNIC</div><div class="info-value">${t.cnic || '—'}</div></div>
      <div class="info-row"><div class="info-label">Address</div><div class="info-value">${t.address}</div></div>
      <div class="info-row"><div class="info-label">Email</div><div class="info-value">${t.email || '—'}</div></div>
      <div class="info-row"><div class="info-label">Gender</div><div class="info-value">${t.gender}</div></div>
      <div class="info-row"><div class="info-label">DOB</div><div class="info-value">${new Date(t.dob).toLocaleDateString()}</div></div>
      <div class="info-row"><div class="info-label">Nationality</div><div class="info-value">${t.nationality}</div></div>
      <div class="info-row"><div class="info-label">Religion</div><div class="info-value">${t.religion}</div></div>
    </div>
    <div class="info-group">
      <h4><i class="fas fa-graduation-cap"></i> Professional Information</h4>
      <div class="info-row"><div class="info-label">Qualification</div><div class="info-value">${t.qualification}</div></div>
      <div class="info-row"><div class="info-label">Subjects</div><div class="info-value"><div style="display:flex;flex-wrap:wrap;gap:6px;">${subjectTags}</div></div></div>
      <div class="info-row"><div class="info-label">Previous School</div><div class="info-value">${t.previousSchool || '—'}</div></div>
      <div class="info-row"><div class="info-label">Experience</div><div class="info-value">${t.experience || '—'}</div></div>
    </div>
    <div class="info-group">
      <h4><i class="fas fa-clock"></i> Enrollment Information</h4>
      <div class="info-row"><div class="info-label">Designation</div><div class="info-value">${t.designation || '—'}</div></div>
      <div class="info-row"><div class="info-label">Joining Date</div><div class="info-value">${new Date(t.joiningDate).toLocaleDateString()}</div></div>
      <div class="info-row"><div class="info-label">Status</div><div class="info-value"><span class="status-badge ${t.status==='Active'?'status-active':'status-inactive'}">${t.status}</span></div></div>
    </div>
  `;
  document.getElementById('teacherSlidePanel').classList.add('active');
}

function closePanel(){
  document.getElementById('teacherSlidePanel').classList.remove('active');
}

function toast(msg){
  let t = document.createElement('div');
  t.className = 'toast-msg';
  t.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

document.getElementById('closeSlideBtn').addEventListener('click', closePanel);
document.getElementById('teacherSlidePanel').addEventListener('click', (e) => {
  if(e.target === document.getElementById('teacherSlidePanel')) closePanel();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && document.getElementById('teacherSlidePanel').classList.contains('active')) closePanel();
});

updateCount();
renderTable();
</script>
</body>
</html>
