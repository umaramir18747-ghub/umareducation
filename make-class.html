<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EHS – Make a Class</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="make-class.css">
  <link rel="stylesheet" href="components-responsive.css">
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
  <main class="main-panel">
    <div class="page-header">
      <div class="header-content">
        <h1><i class="fas fa-chalkboard icon"></i>Make a Class</h1>
        <p>Create a new class session with complete details — straight-edge professional panel.</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <i class="fas fa-info-circle"></i> Class Information
      </div>
      
      <form id="classForm">
        <div class="form-grid-2cols">
          <div class="form-group">
            <label><i class="fas fa-book"></i> Class Name <span class="req">*</span></label>
            <input type="text" class="form-control" id="className" placeholder="e.g. Morning Class A" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-id-card"></i> Class ID <span class="req">*</span></label>
            <input type="text" class="form-control" id="classId" placeholder="e.g. CLS-101" required>
          </div>
        </div>

        <div class="form-grid-3cols">
          <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Session <span class="req">*</span></label>
            <input type="text" class="form-control" id="session" placeholder="e.g. 2025-2026" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-layer-group"></i> Grade <span class="req">*</span></label>
            <select class="form-control" id="grade" required>
              <option value="">-- Select Grade --</option>
              <option>Pre-Nursery</option>
              <option>Nursery</option>
              <option>Post-Nursery</option>
              <option>Grade 1</option>
              <option>Grade 2</option>
              <option>Grade 3</option>
              <option>Grade 4</option>
              <option>Grade 5</option>
              <option>Grade 6</option>
              <option>Grade 7</option>
              <option>Grade 8</option>
              <option>Pre 9th</option>
              <option>Grade 9</option>
              <option>Grade 10</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-tags"></i> Section <span style="color:#64748b;font-weight:400;">(Optional)</span></label>
            <input type="text" class="form-control" id="section" placeholder="e.g. A, B, C">
          </div>
        </div>

        <div class="form-grid-full">
          <div class="form-group">
            <label><i class="fas fa-align-left"></i> Description <span style="color:#64748b;font-weight:400;">(Optional)</span></label>
            <textarea class="form-control" id="description" rows="4" placeholder="Any additional notes about this class..."></textarea>
          </div>
        </div>

        <div class="btn-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Class
          </button>
          <button type="button" class="btn btn-secondary" onclick="resetForm()">
            <i class="fas fa-undo"></i> Reset
          </button>
          <a href="#" class="btn btn-secondary">
            <i class="fas fa-eye"></i> View Details
          </a>
          <a href="principle-dashboard.html" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
          </a>
        </div>
      </form>
    </div>
  </main>
<script src="components.js"></script>
  <script>
        // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
    function resetForm(){
      document.getElementById('classForm').reset();
    }
  </script>
</body>
</html>
