<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EHS – Assign Fee</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="assign-fee.css">
  <link rel="stylesheet" href="components-responsive.css">
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-money-bill-wave" style="color:#2563eb;"></i> Assign Fee</h1>
    <p>Assign fee structure to students in a specific class</p>
  </div>

  <!-- Class Information -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-chalkboard"></i> Class Information
    </div>
    <div class="form-grid-5cols">
      <div class="form-group">
        <label><i class="fas fa-chalkboard-teacher"></i> Class Name <span class="req">*</span></label>
        <select class="form-control" id="classSelect" required onchange="fillClassDetails(); loadStudents()">
          <option value="">-- Select Class --</option>
          <option value="Class A">Class A</option>
          <option value="Class B">Class B</option>
          <option value="Class C">Class C</option>
        </select>
      </div>
      <div class="form-group">
        <label><i class="fas fa-id-card"></i> Class ID</label>
        <input type="text" class="form-control" id="s_classId" disabled placeholder="Auto-generated" value="">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> Session</label>
        <input type="text" class="form-control" id="s_session" disabled placeholder="Session" value="">
      </div>
      <div class="form-group">
        <label><i class="fas fa-layer-group"></i> Grade</label>
        <input type="text" class="form-control" id="s_grade" disabled placeholder="Grade" value="">
      </div>
      <div class="form-group">
        <label><i class="fas fa-tags"></i> Section</label>
        <input type="text" class="form-control" id="s_section" disabled placeholder="Section" value="">
      </div>
    </div>
  </div>

  <!-- Students List -->
  <div class="card" id="studentsCard" style="display:none">
    <div class="card-title">
      <i class="fas fa-users"></i> Student List 
      <span id="classNameBadge" style="margin-left:12px;font-size:15px;color:#64748b"></span>
    </div>
    
    <div class="select-all">
      <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
      <label for="selectAll">Select All Students</label>
    </div>
    
    <div class="student-table-wrapper">
      <table class="student-table" id="studentTable">
        <thead>
          <tr>
            <th>Photo</th>
            <th>Registration Number</th>
            <th>Name</th>
            <th>Father Name</th>
            <th>Fee Amount (PKR)</th>
            <th>Select</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Fee Details -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-file-invoice-dollar"></i> Fee Details
    </div>
    
    <form id="feeForm">
      <div class="form-grid-2cols">
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Fee Type <span class="req">*</span></label>
          <select class="form-control" id="feeType" required>
            <option value="">-- Select Fee Type --</option>
            <option value="Tuition Fee">Tuition Fee</option>
            <option value="Admission Fee">Admission Fee</option>
            <option value="Annual Fee">Annual Fee</option>
            <option value="Exam Fee">Exam Fee</option>
            <option value="Library Fee">Library Fee</option>
            <option value="Sports Fee">Sports Fee</option>
            <option value="Transport Fee">Transport Fee</option>
            <option value="Lab Fee">Lab Fee</option>
          </select>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-calendar-month"></i> Fee Month <span class="req">*</span></label>
          <div class="month-picker-wrapper">
            <div class="month-display" id="monthDisplay">
              <span id="selectedMonthText">-- Select Month & Year --</span>
              <i class="fas fa-chevron-down"></i>
            </div>
            <div class="month-picker-dropdown" id="monthPickerDropdown">
              <div class="year-nav">
                <button type="button" id="prevYearBtn"><i class="fas fa-chevron-left"></i></button>
                <span class="current-year" id="currentYear">2026</span>
                <button type="button" id="nextYearBtn"><i class="fas fa-chevron-right"></i></button>
              </div>
              <div class="months-grid" id="monthsGrid"></div>
              <div class="picker-actions">
                <button type="button" class="btn-clear" id="clearMonthBtn">Clear</button>
                <button type="button" class="btn-this-month" id="thisMonthBtn">This month</button>
              </div>
            </div>
          </div>
          <input type="hidden" id="feeMonth" required>
        </div>
      </div>

      <div class="form-grid-2cols-row">
        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> Due Date <span class="req">*</span></label>
          <input type="date" class="form-control" id="dueDate" required>
        </div>
      </div>

      <div class="form-grid-full">
        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Description <span style="color:#64748b;font-weight:400;">(Optional)</span></label>
          <textarea class="form-control" id="description" rows="4" placeholder="Any additional notes about this fee..."></textarea>
        </div>
      </div>

      <div class="btn-actions">
        <button type="button" onclick="assignFeeToStudents()" class="btn btn-primary">
          <i class="fas fa-save"></i> Assign Fee to Students
        </button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">
          <i class="fas fa-undo"></i> Reset
        </button>
        <a href="#" class="btn btn-secondary">
          <i class="fas fa-eye"></i> View All Fees
        </a>
        <a href="#" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </form>
  </div>
</main>
<script src="components.js"></script>
<script>
      // Load Header and Sidebar
    function loadComponents() {
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    window.onload = function() {
      loadComponents();
      
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };

  // Class Data
  const classData = {
    "Class A": { classId: "CA-2026-001", session: "2025-2026", grade: "Grade 5", section: "A" },
    "Class B": { classId: "CB-2026-002", session: "2025-2026", grade: "Grade 6", section: "B" },
    "Class C": { classId: "CC-2026-003", session: "2025-2026", grade: "Grade 7", section: "C" }
  };

  // Sample Students - Default fee amount changed to 0
  let studentsData = {
    "Class A": [
      {id:1, regNo:"STU-A-1001", name:"Ali Khan", fatherName:"Ahmed Khan", photo:"https://randomuser.me/api/portraits/boys/1.jpg", feeAmount:0},
      {id:2, regNo:"STU-A-1002", name:"Sara Ahmed", fatherName:"Usman Ahmed", photo:"https://randomuser.me/api/portraits/girls/2.jpg", feeAmount:0},
      {id:3, regNo:"STU-A-1003", name:"Bilal Raza", fatherName:"Raza Hussain", photo:"https://randomuser.me/api/portraits/boys/3.jpg", feeAmount:0},
      {id:4, regNo:"STU-A-1004", name:"Fatima Noor", fatherName:"Noor Hassan", photo:"https://randomuser.me/api/portraits/women/4.jpg", feeAmount:0},
      {id:5, regNo:"STU-A-1005", name:"Hamza Malik", fatherName:"Malik Yousaf", photo:"https://randomuser.me/api/portraits/men/5.jpg", feeAmount:0}
    ],
    "Class B": [
      {id:6, regNo:"STU-B-2001", name:"Zainab Tariq", fatherName:"Tariq Javed", photo:"https://randomuser.me/api/portraits/women/6.jpg", feeAmount:0},
      {id:7, regNo:"STU-B-2002", name:"Omar Farooq", fatherName:"Farooq Ahmed", photo:"https://randomuser.me/api/portraits/boys/7.jpg", feeAmount:0},
      {id:8, regNo:"STU-B-2003", name:"Ayesha Khan", fatherName:"Khan Babar", photo:"https://randomuser.me/api/portraits/women/8.jpg", feeAmount:0},
      {id:9, regNo:"STU-B-2004", name:"Hassan Raza", fatherName:"Raza Ali", photo:"https://randomuser.me/api/portraits/men/9.jpg", feeAmount:0},
      {id:10, regNo:"STU-B-2005", name:"Maryam Siddiqui", fatherName:"Siddiqui Iqbal", photo:"https://randomuser.me/api/portraits/women/10.jpg", feeAmount:0}
    ],
    "Class C": []
  };

  // Fill Class Details
  function fillClassDetails() {
    const className = document.getElementById('classSelect').value;
    const classIdField = document.getElementById('s_classId');
    const sessionField = document.getElementById('s_session');
    const gradeField = document.getElementById('s_grade');
    const sectionField = document.getElementById('s_section');

    if (classData[className]) {
      classIdField.value = classData[className].classId;
      sessionField.value = classData[className].session;
      gradeField.value = classData[className].grade;
      sectionField.value = classData[className].section;
    } else {
      classIdField.value = "";
      sessionField.value = "";
      gradeField.value = "";
      sectionField.value = "";
    }
  }

  // Load Students
  function loadStudents() {
    const className = document.getElementById('classSelect').value;
    const studentsCard = document.getElementById('studentsCard');
    const tbody = document.getElementById('studentTableBody');
    const badge = document.getElementById('classNameBadge');
    
    if (!className) {
      studentsCard.style.display = 'none';
      return;
    }
    
    studentsCard.style.display = 'block';
    badge.textContent = `(${className})`;
    tbody.innerHTML = '';
    
    const students = studentsData[className] || [];
    
    students.forEach(student => {
      const photoHtml = student.photo 
        ? `<div class="photo-frame"><img src="${student.photo}" alt="${student.name}"></div>` 
        : `<div class="photo-placeholder"><i class="fas fa-user"></i></div>`;
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${photoHtml}</td>
        <td><strong>${student.regNo}</strong></td>
        <td><strong>${student.name}</strong></td>
        <td>${student.fatherName}</td>
        <td>
          <input type="number" class="fee-input" value="${student.feeAmount}" 
                 onchange="updateIndividualFee(${student.id}, this.value)">
        </td>
        <td style="text-align:center">
          <input type="checkbox" class="student-checkbox" data-id="${student.id}" onchange="checkSelection()">
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  function updateIndividualFee(id, value) {
    for (let cls in studentsData) {
      const stu = studentsData[cls].find(s => s.id === id);
      if (stu) {
        stu.feeAmount = parseFloat(value) || 0;
        break;
      }
    }
  }

  function toggleSelectAll() {
    const checkboxes = document.querySelectorAll('.student-checkbox');
    const isChecked = document.getElementById('selectAll').checked;
    checkboxes.forEach(cb => cb.checked = isChecked);
  }

  function checkSelection() {
    // Optional: logic to update "Select All" checkbox
  }

  function getSelectedStudents() {
    const selected = [];
    document.querySelectorAll('.student-checkbox:checked').forEach(cb => {
      selected.push(parseInt(cb.dataset.id));
    });
    return selected;
  }

  // Unified function: Assign to selected students (or all if none selected)
  function assignFeeToStudents() {
    const className = document.getElementById('classSelect').value;
    if (!className) {
      alert("Please select a class first.");
      return;
    }
    
    const feeType = document.getElementById('feeType').value;
    const feeMonth = document.getElementById('feeMonth').value;
    const dueDate = document.getElementById('dueDate').value;
    
    if (!feeType || !feeMonth || !dueDate) {
      alert("Please fill Fee Type, Month and Due Date first.");
      return;
    }

    const selectedIds = getSelectedStudents();
    const students = studentsData[className] || [];
    let targetStudents = selectedIds.length > 0 
      ? students.filter(s => selectedIds.includes(s.id)) 
      : students;

    if (targetStudents.length === 0) {
      alert("No students available to assign fee.");
      return;
    }

    alert(`Fee assigned successfully to ${targetStudents.length} student(s) in ${className}!`);
    // In real application: save to backend / database
  }

  // Month Picker
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  let currentPickerYear = 2026;
  let selectedMonthValue = "";
  let selectedMonthIndex = -1;

  const monthDisplay = document.getElementById('monthDisplay');
  const monthPickerDropdown = document.getElementById('monthPickerDropdown');
  const selectedMonthText = document.getElementById('selectedMonthText');
  const currentYearSpan = document.getElementById('currentYear');
  const monthsGrid = document.getElementById('monthsGrid');
  const prevYearBtn = document.getElementById('prevYearBtn');
  const nextYearBtn = document.getElementById('nextYearBtn');
  const clearMonthBtn = document.getElementById('clearMonthBtn');
  const thisMonthBtn = document.getElementById('thisMonthBtn');
  const hiddenFeeMonth = document.getElementById('feeMonth');

  function renderMonths(){
    monthsGrid.innerHTML = '';
    for(let i=0; i<12; i++){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'month-btn';
      if(selectedMonthIndex === i && selectedMonthValue === `${monthNames[i]} ${currentPickerYear}`){
        btn.classList.add('selected');
      }
      btn.textContent = monthNames[i].substring(0,3);
      btn.addEventListener('click', () => selectMonth(i));
      monthsGrid.appendChild(btn);
    }
  }

  function selectMonth(i){
    selectedMonthIndex = i;
    selectedMonthValue = `${monthNames[i]} ${currentPickerYear}`;
    selectedMonthText.textContent = selectedMonthValue;
    hiddenFeeMonth.value = selectedMonthValue;
    monthPickerDropdown.classList.remove('show');
    renderMonths();
  }

  function updateYear(delta){
    currentPickerYear += delta;
    currentYearSpan.textContent = currentPickerYear;
    if(selectedMonthValue && !selectedMonthValue.endsWith(currentPickerYear.toString())) selectedMonthIndex = -1;
    renderMonths();
  }

  function setToCurrentMonth(){
    const now = new Date();
    currentPickerYear = now.getFullYear();
    currentYearSpan.textContent = currentPickerYear;
    selectedMonthIndex = now.getMonth();
    selectedMonthValue = `${monthNames[selectedMonthIndex]} ${currentPickerYear}`;
    selectedMonthText.textContent = selectedMonthValue;
    hiddenFeeMonth.value = selectedMonthValue;
    renderMonths();
    monthPickerDropdown.classList.remove('show');
  }

  function clearMonth(){
    selectedMonthIndex = -1;
    selectedMonthValue = "";
    selectedMonthText.textContent = "-- Select Month & Year --";
    hiddenFeeMonth.value = "";
    renderMonths();
    monthPickerDropdown.classList.remove('show');
  }

  if(monthDisplay){
    monthDisplay.addEventListener('click', (e)=>{ e.stopPropagation(); monthPickerDropdown.classList.toggle('show'); });
  }
  document.addEventListener('click', (e)=>{
    if(monthPickerDropdown && monthDisplay && 
       !monthPickerDropdown.contains(e.target) && 
       !monthDisplay.contains(e.target)){
      monthPickerDropdown.classList.remove('show');
    }
  });

  if(prevYearBtn) prevYearBtn.addEventListener('click', () => updateYear(-1));
  if(nextYearBtn) nextYearBtn.addEventListener('click', () => updateYear(1));
  if(clearMonthBtn) clearMonthBtn.addEventListener('click', clearMonth);
  if(thisMonthBtn) thisMonthBtn.addEventListener('click', setToCurrentMonth);

  const now = new Date();
  currentPickerYear = now.getFullYear();
  if(currentYearSpan) currentYearSpan.textContent = currentPickerYear;
  renderMonths();

  function resetForm() {
    document.getElementById('feeForm').reset();
    selectedMonthText.textContent = "-- Select Month & Year --";
    hiddenFeeMonth.value = "";
    renderMonths();
  }
</script>
</body>
</html>
