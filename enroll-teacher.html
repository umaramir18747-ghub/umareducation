<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Enroll Teacher</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="enroll-teacher.css">
<link rel="stylesheet" href="components-responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="app-wrapper" id="appWrapper">
    <div id="sidebar-placeholder"></div>

    <main class="main-panel">
      <div class="page-header">
        <div class="header-content">
          <h1><i class="fas fa-chalkboard-teacher icon"></i>Enroll Teacher</h1>
          <p>Register a new teacher with personal and professional details</p>
        </div>
      </div>

      <form id="teacherForm">
        <div class="card">
          <div class="card-title">
            <i class="fas fa-user"></i> Teacher Personal Information
          </div>
          <div class="photo-section">
            <div class="photo-container">
              <div class="photo-heading">Teacher Photo</div>
              <div class="photo-frame" id="photoFrame"><i class="fas fa-camera"></i><img id="photoPreview" alt="Teacher Photo"></div>
              <div class="file-name" id="fileName">No file chosen</div>
              <input type="file" id="photoInput" accept="image/*" style="display:none">
            </div>
            
            <div style="flex:1">
              <div class="form-grid-4cols">
                <!-- Enhanced Registration Number Field -->
                <div class="form-group">
                  <label><i class="fas fa-hashtag"></i> Reg No. <span class="req">*</span></label>
                  <input type="text" class="form-control" id="regNo" required>
                </div>

                <div class="form-group"><label><i class="fas fa-user"></i> Teacher Name <span class="req">*</span></label><input type="text" class="form-control" id="teacherName" required></div>
                <div class="form-group"><label><i class="fas fa-user-tie"></i> Father Name <span class="req">*</span></label><input type="text" class="form-control" id="fatherName" required></div>
                <div class="form-group"><label><i class="fas fa-phone"></i> Phone</label><input type="text" class="form-control" id="phone" maxlength="12"></div>
                
                <div class="form-group"><label><i class="fas fa-id-card"></i> CNIC</label><input type="text" class="form-control" id="cnic" maxlength="15"></div>
                <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" class="form-control" id="email"></div>
                <div class="form-group">
                  <label><i class="fas fa-venus-mars"></i> Gender</label>
                  <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="gender" value="Male"> Male</label>
                    <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
                  </div>
                </div>
                <div class="form-group"><label><i class="fas fa-calendar-day"></i> Date of Birth</label><input type="date" class="form-control" id="dob"></div>

                <div class="form-group"><label><i class="fas fa-globe"></i> Nationality</label><input type="text" class="form-control" id="nationality" value="Pakistani"></div>
                <div class="form-group"><label><i class="fas fa-pray"></i> Religion</label><input type="text" class="form-control" id="religion" value="Islam"></div>
                <div class="form-group"><label><i class="fas fa-sign-in-alt"></i> Joining Date</label><input type="date" class="form-control" id="joiningDate"></div>
                <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> Address</label><input type="text" class="form-control" id="address"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="fas fa-briefcase"></i> Teacher Professional Information
          </div>
          <div class="form-grid-5cols">
            <div class="form-group"><label><i class="fas fa-graduation-cap"></i> Qualification</label><input type="text" class="form-control" id="qualification"></div>
            <div class="form-group"><label><i class="fas fa-book"></i> Subject</label><input type="text" class="form-control" id="subject"></div>
            <div class="form-group"><label><i class="fas fa-school"></i> Previous School</label><input type="text" class="form-control" id="prevSchool"></div>
            <div class="form-group"><label><i class="fas fa-clock"></i> Experience</label><input type="text" class="form-control" id="experience"></div>
            <div class="form-group">
              <label><i class="fas fa-user-tie"></i> Designation</label>
              <select class="form-control" id="designation">
                <option value="">-- Select --</option>
                <option>Junior Teacher</option>
                <option>Senior Teacher</option>
              </select>
            </div>
          </div>

          <div class="btn-actions">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Enroll Teacher</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
            <a href="#" class="btn btn-secondary"><i class="fas fa-eye"></i> View Details</a>
            <a href="#" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
          </div>
        </div>
      </form>
    </main>
  </div>

<script src="components.js"></script>
<script>
  function loadComponents() {
    fetch('header.html').then(r => r.text()).then(d => document.getElementById('header-placeholder').innerHTML = d);
    fetch('sidebar.html').then(r => r.text()).then(d => document.getElementById('sidebar-placeholder').innerHTML = d);
  }

  window.onload = function() {
    loadComponents();
    
    setTimeout(() => { 
      if (typeof window.initHeaderAndSidebar === 'function') window.initHeaderAndSidebar(); 
    }, 400);

    // Initialize Registration Number with Teacher prefix
    initRegNoField();
  };

  // Initialize Registration Number with T_EHS- prefix
  function initRegNoField() {
    const regNoInput = document.getElementById('regNo');
    
    // Set default prefix if field is empty
    if (!regNoInput.value.trim()) {
      regNoInput.value = "T_EHS-";
    }

    // Prevent removal of prefix
    regNoInput.addEventListener('input', function() {
      let value = this.value;
      
      if (!value.startsWith("T_EHS-")) {
        this.value = "T_EHS-" + value.replace(/^T_EHS-?/, "");
      }
    });

    // Place cursor at the end when focused
    regNoInput.addEventListener('focus', function() {
      if (this.value.startsWith("T_EHS-")) {
        const cursorPos = this.value.length;
        this.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }

  const photoInput=document.getElementById('photoInput');
  const photoFrame=document.getElementById('photoFrame');
  const photoPreview=document.getElementById('photoPreview');
  const fileName=document.getElementById('fileName');

  photoFrame.addEventListener('click',()=>photoInput.click());
  photoInput.addEventListener('change',e=>{
    const file=e.target.files[0];
    if(file){
      fileName.textContent=file.name;
      const reader=new FileReader();
      reader.onload=ev=>{photoPreview.src=ev.target.result;photoFrame.classList.add('has-image')};
      reader.readAsDataURL(file);
    }
  });

  function resetForm(){
    document.getElementById('teacherForm').reset();
    
    // Reset Reg No with teacher prefix
    const regNoInput = document.getElementById('regNo');
    regNoInput.value = "T_EHS-";
    
    photoPreview.src='';
    photoFrame.classList.remove('has-image');
    fileName.textContent='No file chosen';
  }
</script>
</body>
</html>
