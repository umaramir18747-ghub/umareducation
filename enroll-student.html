<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Enroll Student</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="enroll-student.css">
<link rel="stylesheet" href="components-responsive.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="app-wrapper" id="appWrapper">
    <div id="sidebar-placeholder"></div>

    <main class="main-panel">
      <div class="page-header">
        <div class="header-content">
          <h1><i class="fas fa-user-graduate icon"></i>Enroll Student</h1>
          <p>Register a new student with class assignment and personal details</p>
        </div>
      </div>

      <form id="studentForm">
        <div class="card">
          <div class="card-title">
            <i class="fas fa-chalkboard"></i> Class Information
          </div>
          <div class="form-grid-5cols">
            <div class="form-group">
              <label><i class="fas fa-chalkboard-teacher"></i> Class Name <span class="req">*</span></label>
              <select class="form-control" id="classSelect" required>
                <option value="">-- Select Class --</option>
                <option value="Class A">Class A</option>
              </select>
            </div>
            <div class="form-group"><label><i class="fas fa-id-card"></i> Class ID</label><input type="text" class="form-control" id="s_classId" disabled></div>
            <div class="form-group"><label><i class="fas fa-calendar-alt"></i> Session</label><input type="text" class="form-control" id="s_session" disabled></div>
            <div class="form-group"><label><i class="fas fa-layer-group"></i> Grade</label><input type="text" class="form-control" id="s_grade" disabled></div>
            <div class="form-group"><label><i class="fas fa-tags"></i> Section</label><input type="text" class="form-control" id="s_section" disabled></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="fas fa-user"></i> Student Personal Information
          </div>
          
          <div class="photo-section">
            <div class="photo-container">
              <div class="photo-heading">Student Photo</div>
              <div class="photo-frame" id="photoFrame"><i class="fas fa-camera"></i><img id="photoPreview" alt="Student Photo"></div>
              <div class="file-name" id="fileName">No file chosen</div>
              <input type="file" id="photoInput" accept="image/*" style="display:none">
            </div>
            <div style="flex:1">
              <div class="form-grid-4cols">
                <!-- Enhanced Registration Number Field -->
                <div class="form-group">
                  <label><i class="fas fa-hashtag"></i> Reg No. <span class="req">*</span></label>
                  <input type="text" class="form-control" id="regNo" required>
                </div>

                <div class="form-group"><label><i class="fas fa-user"></i> Student Name <span class="req">*</span></label><input type="text" class="form-control" id="studentName" required></div>
                <div class="form-group"><label><i class="fas fa-user-tie"></i> Father Name <span class="req">*</span></label><input type="text" class="form-control" id="fatherName" required></div>
                <div class="form-group"><label><i class="fas fa-phone"></i> Phone</label><input type="text" class="form-control" id="phone" maxlength="12"></div>
                
                <div class="form-group"><label><i class="fas fa-id-card"></i> CNIC</label><input type="text" class="form-control" id="cnic" maxlength="15"></div>
                <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" class="form-control" id="email"></div>
                <div class="form-group">
                  <label><i class="fas fa-venus-mars"></i> Gender</label>
                  <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="gender" value="Male"> Male</label>
                    <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
                  </div>
                </div>
                <div class="form-group"><label><i class="fas fa-calendar-day"></i> Date of Birth</label><input type="date" class="form-control" id="dob"></div>

                <div class="form-group"><label><i class="fas fa-globe"></i> Nationality</label><input type="text" class="form-control" id="nationality" value="Pakistani"></div>
                <div class="form-group"><label><i class="fas fa-pray"></i> Religion</label><input type="text" class="form-control" id="religion" value="Islam"></div>
                <div class="form-group"><label><i class="fas fa-sign-in-alt"></i> Joining Date</label><input type="date" class="form-control" id="joiningDate"></div>
                <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> Address</label><input type="text" class="form-control" id="address"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Guardian Information -->
        <div class="card">
          <div class="card-title">
            <i class="fas fa-users"></i> Guardian Information
          </div>
          <div class="form-grid-5cols">
            <div class="form-group">
              <label><i class="fas fa-user-shield"></i> Guardian Name <span class="req">*</span></label>
              <input type="text" class="form-control" id="guardianName" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-heart"></i> Relationship</label>
              <input type="text" class="form-control" id="guardianRelationship" placeholder="e.g. Father, Mother, Guardian" value="Father">
            </div>
            <div class="form-group">
              <label><i class="fas fa-phone"></i> Guardian Phone <span class="req">*</span></label>
              <input type="text" class="form-control" id="guardianPhone" maxlength="12" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-id-card"></i> Guardian CNIC</label>
              <input type="text" class="form-control" id="guardianCnic" maxlength="15">
            </div>
            <div class="form-group">
              <label><i class="fas fa-briefcase"></i> Occupation</label>
              <input type="text" class="form-control" id="guardianOccupation">
            </div>
          </div>

          <div class="btn-actions">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Enroll Student</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
            <a href="#" class="btn btn-secondary"><i class="fas fa-eye"></i> View Details</a>
            <a href="#" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
          </div>
        </div>
      </form>
    </main>
  </div>

<script src="components.js"></script>
<script>
  function loadComponents() {
    fetch('header.html').then(r => r.text()).then(d => document.getElementById('header-placeholder').innerHTML = d);
    fetch('sidebar.html').then(r => r.text()).then(d => document.getElementById('sidebar-placeholder').innerHTML = d);
  }

  window.onload = function() {
    loadComponents();
    
    setTimeout(() => { 
      if (typeof window.initHeaderAndSidebar === 'function') window.initHeaderAndSidebar(); 
    }, 400);

    // === Registration Number Autofill Logic ===
    initRegNoField();
  };

  // Initialize Registration Number with prefix
  function initRegNoField() {
    const regNoInput = document.getElementById('regNo');
    
    if (!regNoInput.value.trim()) {
      regNoInput.value = "S_EHS-";
    }

    regNoInput.addEventListener('input', function() {
      let value = this.value;
      if (!value.startsWith("S_EHS-")) {
        this.value = "S_EHS-" + value.replace(/^S_EHS-?/, "");
      }
    });

    regNoInput.addEventListener('focus', function() {
      if (this.value.startsWith("S_EHS-")) {
        const cursorPos = this.value.length;
        this.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }

  const photoInput=document.getElementById('photoInput');
  const photoFrame=document.getElementById('photoFrame');
  const photoPreview=document.getElementById('photoPreview');
  const fileName=document.getElementById('fileName');

  photoFrame.addEventListener('click',()=>photoInput.click());
  photoInput.addEventListener('change',e=>{
    const file=e.target.files[0];
    if(file){
      fileName.textContent=file.name;
      const reader=new FileReader();
      reader.onload=ev=>{photoPreview.src=ev.target.result;photoFrame.classList.add('has-image')};
      reader.readAsDataURL(file);
    }
  });

  function resetForm(){
    document.getElementById('studentForm').reset();
    
    // Reset Reg No with prefix
    const regNoInput = document.getElementById('regNo');
    regNoInput.value = "S_EHS-";
    
    photoPreview.src='';
    photoFrame.classList.remove('has-image');
    fileName.textContent='No file chosen';
  }
</script>
</body>
</html>
